[config]
schemaVersion = "0.0.1"

[package]
namespace = "1andonlyWeaver"
name = "ProvokingTheFates"
versionNumber = "0.0.1"
description = "Provoke reward doors to upgrade them — at the cost of temporary Oath of the Unseen fear."
websiteUrl = "https://github.com/1andonlyWeaver/hades2-provoking-the-fates-mod"
containsNsfwContent = false

[package.dependencies]
Hell2Modding-Hell2Modding = "1.0.70"
LuaENVY-ENVY = "1.2.0"
SGG_Modding-Chalk = "2.1.1"
SGG_Modding-ReLoad = "1.0.2"
SGG_Modding-SJSON = "1.0.0"
SGG_Modding-ModUtil = "4.0.1"
BlueRaja-IncantationsAPI = "1.0.0"

[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./build"

[[build.copy]]
source = "./CHANGELOG.md"
target = "./CHANGELOG.md"

[[build.copy]]
source = "./LICENSE"
target = "./LICENSE"

[[build.copy]]
source = "./src"
target = "./plugins"

[[build.copy]]
source = "./icon.png"
target = "./plugins/icon.png"

[[build.copy]]
source = "./LICENSE"
target = "./plugins/LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = ["hades-ii"]

[publish.categories]
hades-ii = ["mods"]
